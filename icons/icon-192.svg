<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">蔡叔叔比薩屋圖示</title>
  <desc id="desc">參考招牌風格設計的紅黃黑餐飲品牌方形圖示</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="92" fill="#0b0b0d"/>
  <rect x="14" y="14" width="484" height="484" rx="80" fill="none" stroke="#1f1f22" stroke-width="8"/>

  <!-- Decorative glow -->
  <ellipse cx="256" cy="255" rx="215" ry="185" fill="#17171a" opacity="0.72"/>

  <!-- Top Chinese brand name -->
  <g filter="url(#shadow)" transform="rotate(-5 256 150)">
    <text x="256" y="163"
          text-anchor="middle"
          font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif"
          font-size="112"
          font-weight="1000"
          letter-spacing="-8"
          fill="#ff1744"
          stroke="#050506"
          stroke-width="12"
          paint-order="stroke fill">蔡叔叔</text>
  </g>

  <!-- English yellow ribbon -->
  <g filter="url(#smallShadow)" transform="rotate(4 256 224)">
    <path d="M84 190 Q256 168 428 196 L413 252 Q256 232 99 255 Z"
          fill="#ffd84d" stroke="#050506" stroke-width="10" stroke-linejoin="round"/>
    <text x="256" y="229"
          text-anchor="middle"
          font-family="Arial Black, Arial, sans-serif"
          font-size="55"
          font-weight="900"
          font-style="italic"
          letter-spacing="1"
          fill="#171717">CAISHUSHU</text>
  </g>

  <!-- Bottom Chinese category -->
  <g filter="url(#shadow)" transform="rotate(-3 256 330)">
    <text x="238" y="353"
          text-anchor="middle"
          font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif"
          font-size="104"
          font-weight="1000"
          letter-spacing="-7"
          fill="#ff1744"
          stroke="#050506"
          stroke-width="12"
          paint-order="stroke fill">比薩屋</text>
  </g>

  <!-- Food labels -->
  <g filter="url(#smallShadow)" transform="rotate(3 350 385)">
    <text x="346" y="346"
          font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif"
          font-size="42"
          font-weight="1000"
          fill="#ffd84d"
          stroke="#050506"
          stroke-width="7"
          paint-order="stroke fill">炸雞</text>
    <text x="330" y="405"
          font-family="Noto Sans TC, PingFang TC, Microsoft JhengHei, sans-serif"
          font-size="48"
          font-weight="1000"
          fill="#ff1744"
          stroke="#050506"
          stroke-width="7"
          paint-order="stroke fill">烤雞</text>
  </g>

  <!-- Small pizza accent -->
  <g transform="translate(73 370) rotate(-12)" filter="url(#smallShadow)">
    <path d="M0 0 L88 24 L25 90 Z" fill="#ffd84d" stroke="#050506" stroke-width="8" stroke-linejoin="round"/>
    <path d="M0 0 Q44 -18 88 24" fill="none" stroke="#ff1744" stroke-width="14" stroke-linecap="round"/>
    <circle cx="36" cy="32" r="8" fill="#ff1744"/>
    <circle cx="54" cy="53" r="7" fill="#ff1744"/>
    <circle cx="25" cy="61" r="6" fill="#ff1744"/>
  </g>
</svg>