<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#b94b2f" />
  <title>排班管理系統｜主管後台</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <link rel="icon" href="icons/icon-192.svg" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark" id="brandMark">蔡</div>
        <div>
          <strong id="brandName">排班管理系統</strong>
          <span>排班管理系統</span>
        </div>
      </div>
      <nav class="nav">
        <button class="nav-item active" data-view="dashboard">總覽</button>
        <div class="nav-group">作業</div>
        <button class="nav-item" data-view="availability">可上班時間</button>
        <button class="nav-item" data-view="schedule">排班管理</button>
        <button class="nav-item" data-view="hours">工時總覽</button>
        <div class="nav-group">設定</div>
        <button class="nav-item" data-view="employees">員工管理</button>
        <button class="nav-item" data-view="worktypes">工作管理</button>
        <button class="nav-item" data-view="storeSettings">設定與維護</button>
      </nav>
      <div class="sidebar-note">
        <strong>原型版本 v0.1</strong>
        <span>資料暫存在此裝置瀏覽器</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="icon-btn mobile-only" id="menuBtn" aria-label="開啟選單">☰</button>
        <div>
          <h1 id="pageTitle">營運總覽</h1>
          <p id="pageSubtitle">快速掌握本月排班與人力狀況</p>
        </div>
        <div class="topbar-actions"></div>
      </header>

      <section class="view active" id="dashboardView">
        <div class="stats-grid" id="dashboardStats"></div>

        <div class="two-col">
          <section class="panel">
            <div class="panel-head">
              <div><h3>今日班表</h3><p id="todayLabel"></p></div>
              <button class="text-btn" data-view-target="schedule">查看排班</button>
            </div>
            <div id="todayShifts" class="stack-list"></div>
          </section>
          <section class="panel">
            <div class="panel-head"><div><h3>排班提醒</h3><p>系統依目前資料自動提示</p></div></div>
            <div id="dashboardWarnings" class="stack-list"></div>
          </section>
        </div>
      </section>

      <section class="view" id="employeesView">
        <div class="section-toolbar end">
          <button class="primary-btn" id="addEmployeeBtn">＋ 新增員工</button>
        </div>
        <div class="panel table-panel">
          <div class="filter-row">
            <input id="employeeSearch" class="input" placeholder="搜尋姓名或員工編號" />
            <select id="employeeStatusFilter" class="select">
              <option value="all">全部員工</option>
              <option value="active">在職</option>
              <option value="inactive">停用</option>
            </select>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>員工</th><th>員工編號</th><th>可做工作</th><th>每週上限</th><th>狀態</th><th></th></tr></thead>
              <tbody id="employeesTable"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="view" id="worktypesView">
        <div class="section-toolbar end">
          <button class="primary-btn" id="addWorktypeBtn">＋ 新增工作</button>
        </div>
        <div id="worktypeCards" class="card-grid"></div>
      </section>

      <section class="view" id="scheduleView">
        <div class="section-toolbar end">
          <button class="primary-btn" id="schedAddBtn">＋ 班次</button>
        </div>
        <div class="schedule-stack">
          <section class="panel calendar-panel">
            <div class="calendar-head">
              <button class="icon-btn" id="prevMonthBtn">‹</button>
              <strong id="calendarMonthLabel"></strong>
              <button class="icon-btn" id="nextMonthBtn">›</button>
            </div>
            <div class="weekdays"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
            <div id="calendarGrid" class="calendar-grid"></div>
          </section>

          <section class="panel timeline-panel">
            <div class="panel-head sched-head">
              <div><h3 id="selectedDateTitle"></h3><p id="selectedDateSummary"></p></div>
              <div class="sched-controls">
                <div class="seg" id="schedModeTabs">
                  <button class="seg-btn active" data-smode="day">日</button>
                  <button class="seg-btn" data-smode="week">週</button>
                </div>
                <button class="icon-btn" id="schedPrev">‹</button>
                <button class="icon-btn" id="schedNext">›</button>
              </div>
            </div>
            <p class="sched-hint">點日曆空白時段可直接新增班次，點色塊可編輯。</p>
            <div class="sched-grid-wrap" id="scheduleGrid"></div>
          </section>
        </div>
      </section>

      <section class="view" id="availabilityView">
        <div class="staff-tabs" id="availPageTabs">
          <button class="staff-tab active" data-atab="settings">開放設定</button>
          <button class="staff-tab" data-atab="overview">填寫狀況</button>
        </div>

        <div class="avail-tab-panel" id="availSettingsPanel">
          <div class="section-toolbar end">
            <button class="primary-btn" id="addAvailabilityWindowBtn">＋ 新增開放區段</button>
          </div>
          <div class="info-banner">
            <div class="list-icon">說</div>
            <div>
              <strong>設定範例</strong>
              <span>7/17～7/20 開放填寫，員工填寫 8/1～8/15 的可上班時間。</span>
            </div>
          </div>
          <div id="availabilityWindowCards" class="window-card-grid"></div>
        </div>

        <div class="avail-tab-panel hidden" id="availOverviewPanel">
          <div id="availOverviewSummary"></div>
          <div class="staff-tabs" id="availModeTabs">
            <button class="staff-tab active" data-mode="month">月曆模式</button>
            <button class="staff-tab" data-mode="date">日期模式</button>
            <button class="staff-tab" data-mode="employee">員工模式</button>
          </div>
          <div id="availabilityOverviewBody"></div>
        </div>
      </section>

      <section class="view" id="hoursView">
        <div class="section-toolbar end">
          <div class="topbar-actions">
            <button class="icon-btn" id="prevWeekBtn">‹</button>
            <button class="ghost-btn" id="thisWeekBtn">本週</button>
            <button class="icon-btn" id="nextWeekBtn">›</button>
          </div>
        </div>
        <div class="info-banner">
          <div class="list-icon">週</div>
          <div>
            <strong id="hoursWeekLabel"></strong>
            <span>黃底＝接近上限（達 90%）、紅底＝超過每週上限；外籍學生以「外籍」標示，僅提醒不阻擋排班。</span>
          </div>
        </div>
        <div class="panel table-panel"><div class="table-wrap" id="hoursTable"></div></div>
      </section>

      <section class="view" id="storeSettingsView">
        <form class="panel" id="storeSettingsForm" style="padding:22px"></form>
        <div class="panel maintenance-card">
          <h3>資料維護</h3>
          <p>將所有資料還原為示範內容。測試階段使用，會清除目前的員工、班次與員工填寫的可上班時間紀錄。</p>
          <button type="button" class="ghost-btn" id="resetDemoBtn">重置示範資料</button>
        </div>
      </section>
</main>
  </div>

  <div class="modal-backdrop hidden" id="modalBackdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-head">
        <div><h3 id="modalTitle"></h3><p id="modalSubtitle"></p></div>
        <button class="icon-btn" id="modalCloseBtn">✕</button>
      </div>
      <form id="modalForm" class="modal-body"></form>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>
</html>
