<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#b94b2f" />
  <title>蔡叔叔排班｜員工專區</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <link rel="icon" href="icons/icon-192.svg" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="staff-page">
  <main class="staff-page-main">
    <header class="staff-brandbar">
      <div class="brand">
        <div class="brand-mark">蔡</div>
        <div>
          <strong>蔡叔叔排班</strong>
          <span>員工專區</span>
        </div>
      </div>
    </header>

    <section class="staff-shell">
      <div class="staff-login-card" id="staffLoginCard">
        <div class="brand-mark large-mark">蔡</div>
        <span class="eyebrow">Employee Portal</span>
        <h1>查看班表與填寫可排時間</h1>
        <p>輸入業主設定的員工編號即可進入，不需要密碼。</p>
        <label class="field">
          <span>員工編號</span>
          <input id="staffNoInput" class="input big-input" autocomplete="off" inputmode="text" placeholder="例如 A012" />
        </label>
        <button id="staffLoginBtn" class="primary-btn full">進入員工專區</button>
        <p class="helper">示範編號：A012、A018、B005</p>
        <div id="staffLoginError" class="form-error"></div>
      </div>

      <div id="staffPortal" class="staff-portal hidden">
        <div class="staff-portal-head">
          <div>
            <span class="eyebrow">員工專區</span>
            <h1 id="staffWelcome"></h1>
          </div>
          <button class="ghost-btn" id="staffLogoutBtn">切換員工</button>
        </div>

        <div class="staff-summary-grid" id="staffSummary"></div>

        <div class="staff-tabs">
          <button class="staff-tab active" data-staff-tab="mySchedule">我的班表</button>
          <button class="staff-tab" data-staff-tab="availability">可排時間</button>
        </div>

        <div class="staff-tab-panel active" id="mySchedulePanel">
          <div class="panel">
            <div class="panel-head">
              <div><h3>近期班表</h3><p>只顯示自己的班次</p></div>
            </div>
            <div id="staffShiftList" class="stack-list"></div>
          </div>
        </div>

        <div class="staff-tab-panel" id="availabilityPanel">
          <div class="panel">
            <div class="panel-head">
              <div><h3>填寫可排時間</h3><p>時間以 30 分鐘為單位，可填寫 4 點後才能上班等情況。</p></div>
            </div>
            <div class="availability-form">
              <label class="field"><span>日期</span><input type="date" id="availabilityDate" class="input" /></label>
              <label class="check-row"><input type="checkbox" id="availabilityUnavailable" /> 這一天整天不可排班</label>
              <div class="time-pair">
                <label class="field"><span>最早可上班</span><select id="availabilityStart" class="select"></select></label>
                <label class="field"><span>最晚可下班</span><select id="availabilityEnd" class="select"></select></label>
              </div>
              <button id="saveAvailabilityBtn" class="primary-btn">儲存可排時間</button>
              <div id="availabilitySaved" class="success-note"></div>
            </div>
            <div class="divider"></div>
            <div id="availabilityList" class="stack-list"></div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script src="js/staff.js"></script>
</body>
</html>
