<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#b94b2f" />
  <title>員工班表系統</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />
  <link rel="icon" href="icons/icon-192.svg" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="staff-page">
  <main class="staff-page-main">
    <header class="staff-brandbar">
      <div class="brand">
        <div class="brand-mark" id="staffBrandMark">蔡</div>
        <div>
          <strong id="staffBrandName">員工班表系統</strong>
        </div>
      </div>
      <span id="syncStatus" class="sync-badge init">◌ 初始化</span>
    </header>

    <section class="staff-shell">
      <div class="staff-login-card" id="staffLoginCard">
        <div class="brand-mark large-mark">蔡</div>
        <span class="eyebrow">Employee Portal</span>
        <h1>查看班表與填寫可上班時間</h1>
        <p>輸入你的員工編號即可進入。</p>
        <label class="field">
          <span>員工編號</span>
          <input id="staffNoInput" class="input big-input" autocomplete="off" inputmode="text" />
        </label>
        <button id="staffLoginBtn" class="primary-btn full">進入員工專區</button>
        <div id="staffLoginError" class="form-error"></div>
      </div>

      <div id="staffPortal" class="staff-portal hidden">
        <div class="staff-portal-head">
          <div>
            <h1 id="staffWelcome"></h1>
          </div>
          <button class="ghost-btn" id="staffLogoutBtn">登出</button>
        </div>

        <div class="publish-update-banner hidden" id="publishUpdateBanner"></div>
        <div class="next-shift-card" id="nextShiftCard"></div>
        <div class="availability-window-banner" id="availabilityWindowBanner"></div>

        <div class="staff-tabs">
          <button class="staff-tab active" data-staff-tab="mySchedule">我的班表</button>
          <button class="staff-tab" data-staff-tab="availability">填寫可上班時間</button>
        </div>

        <div class="staff-tab-panel active" id="mySchedulePanel">
          <div class="panel">
            <div class="panel-head">
              <div><h3>我的班表</h3><p>顯示即將到來與已結束（前後約三個月），含備註。</p></div>
              <button class="ghost-btn" id="addAllCalBtn">📅 加入行事曆</button>
            </div>
            <div id="staffShiftList" class="stack-list"></div>
          </div>
        </div>

        <div class="staff-tab-panel" id="availabilityPanel">
          <div class="panel">
            <div class="panel-head">
              <div>
                <h3>填寫可上班時間</h3>
                <p>先用「快速設定」整週套用，再點個別日期微調。</p>
              </div>
            </div>

            <div class="avail-disclaimer">※ 填寫可上班時間僅為調查意願，實際排班依最後公布的班表為準。</div>

            <div id="availabilityClosedMessage" class="closed-message hidden"></div>

            <div id="availabilityCalendarArea">
              <div class="quick-week" id="quickWeekBlock">
                <div class="quick-week-row">
                  <span class="quick-week-label">快速設定・每週</span>
                  <div class="quick-week-days" id="quickWeekDays"></div>
                </div>
                <div class="quick-week-time time-pair">
                  <label class="field"><span>最早可上班</span><select id="quickWeekStart" class="select"></select></label>
                  <label class="field"><span>最晚可下班</span><select id="quickWeekEnd" class="select"></select></label>
                </div>
                <div class="quick-week-actions">
                  <button class="qw-btn-yes" id="quickWeekAvailable">設為可上班</button>
                  <button class="qw-btn-no" id="quickWeekUnavailable">設為整天不可上班</button>
                </div>
                <small class="field-help">先勾星期（可多選）與時間，例如每週一～五 12:00～18:00 都可上班；套用後仍可點個別日期修改。</small>
              </div>

              <div class="employee-calendar-toolbar">
                <button class="icon-btn" id="staffPrevMonthBtn">‹</button>
                <strong id="staffCalendarMonthLabel"></strong>
                <button class="icon-btn" id="staffNextMonthBtn">›</button>
              </div>
              <div class="weekdays"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
              <div id="staffAvailabilityCalendar" class="employee-calendar-grid"></div>

              <div class="calendar-legend">
                <span><i class="legend-dot available"></i>可上班</span>
                <span><i class="legend-dot unavailable"></i>不可排班</span>
                <span><i class="legend-dot pending"></i>尚未填寫</span>
              </div>

              <div class="selected-day-editor" id="selectedDayEditor">
                <div class="selected-day-head">
                  <div>
                    <span class="eyebrow">選取日期</span>
                    <h3 id="availabilitySelectedDateTitle"></h3>
                  </div>
                  <span id="availabilityDayStatus" class="badge"></span>
                </div>
                <div class="quick-day-actions">
                  <button class="quick-yes" id="quickDayYes">✓ 整天可上班</button>
                  <button class="quick-no" id="quickDayNo">✗ 整天不行</button>
                </div>
                <div class="day-detail">
                  <p class="day-detail-title">想指定時段</p>
                  <div class="time-pair">
                    <label class="field"><span>最早可上班</span><select id="availabilityStart" class="select"></select></label>
                    <label class="field"><span>最晚可下班</span><select id="availabilityEnd" class="select"></select></label>
                  </div>
                  <button id="saveAvailabilityBtn" class="primary-btn">儲存這一天</button>
                </div>
                <div id="availabilitySaved" class="success-note"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/cloud.js"></script>
  <script src="js/staff.js"></script>
</body>
</html>
